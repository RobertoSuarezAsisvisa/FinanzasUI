<section class="auth-layout">
  <div class="auth-panel">
    <div class="brand-row">
      <span class="brand-mark">F</span>
      <span>
        <strong>Finanzas</strong>
        <small>Control personal seguro</small>
      </span>
    </div>

    <div class="mode-tabs" role="tablist" aria-label="Modo de autenticacion">
      <button type="button" [class.active]="mode() === 'login'" (click)="setMode('login')">Login</button>
      <button type="button" [class.active]="mode() === 'register'" (click)="setMode('register')">Registro</button>
    </div>

    <h1>{{ title() }}</h1>

    <form [formGroup]="form" (ngSubmit)="submit()">
      @if (mode() === 'register') {
        <label>
          Nombre
          <input pInputText type="text" formControlName="displayName" autocomplete="name" />
        </label>
      }

      <label>
        Email
        <input pInputText type="email" formControlName="email" autocomplete="email" />
      </label>

      <label>
        Password
        <p-password formControlName="password" [feedback]="mode() === 'register'" [toggleMask]="true" autocomplete="current-password" styleClass="password-field"></p-password>
      </label>

      @if (error()) {
        <p class="error-message">{{ error() }}</p>
      }

      <button pButton type="submit" [label]="submitLabel()" icon="pi pi-lock" [loading]="loading()" class="primary-action"></button>
    </form>

    <div class="separator"><span>o</span></div>

    <button pButton type="button" severity="secondary" outlined icon="pi pi-google" label="Continuar con Google" [loading]="googleLoading()" (click)="google()" class="google-action"></button>
  </div>
</section>
