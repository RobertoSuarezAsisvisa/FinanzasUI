<p-toast></p-toast>
<p-confirmDialog></p-confirmDialog>

@if (isAuthPage()) {
  <router-outlet></router-outlet>
} @else {
<div class="app-shell" [class.sidebar-collapsed]="sidebarCollapsed">
  <button type="button" class="sidebar-backdrop" [class.open]="menuOpen" aria-label="Cerrar menu lateral" (click)="menuOpen = false"></button>

  <aside class="app-sidebar" [class.open]="menuOpen">
    <a class="brand" routerLink="/dashboard" (click)="menuOpen = false">
      <span class="brand-mark">F</span>
      <span class="brand-copy">
        <strong>Finanzas</strong>
        <small>Control personal</small>
      </span>
    </a>

    <nav>
      <a *ngFor="let item of navItems" [routerLink]="item.route" routerLinkActive="active" (click)="menuOpen = false">
        <i [class]="item.icon"></i>
        <span>{{ item.label }}</span>
      </a>
    </nav>
  </aside>

  <div class="app-main">
    <p-toolbar styleClass="topbar">
      <div class="topbar-left">
        <button
          pButton
          type="button"
          [icon]="sidebarCollapsed ? 'pi pi-angle-right' : 'pi pi-bars'"
          text
          rounded
          class="menu-button"
          [attr.aria-label]="sidebarCollapsed ? 'Abrir menu lateral' : 'Cerrar menu lateral'"
          (click)="toggleSidebar()"
        ></button>
        <span>Finanzas UI</span>
      </div>
      <div class="topbar-actions">
        <span class="api-pill">{{ auth.user()?.displayName || auth.user()?.email }}</span>
        <button pButton type="button" icon="pi pi-sign-out" text rounded aria-label="Cerrar sesion" (click)="logout()"></button>
      </div>
    </p-toolbar>

    <main>
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
}
