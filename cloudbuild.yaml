steps:
  - name: 'node:22.22.0'
    entrypoint: bash
    args:
      - '-c'
      - |
        npm install --global bun@1.3.3
        bun install --frozen-lockfile
        bun run build:gcs
        grep '<base href="/finanzas-ui/">' dist/finanzas-ui/browser/index.html

  - name: 'gcr.io/cloud-builders/gsutil'
    args: ['-m', 'rsync', '-r', '-d', 'dist/finanzas-ui/browser', 'gs://finanzas-ui']

  - name: 'gcr.io/cloud-builders/gsutil'
    args: ['setmeta', '-h', 'Cache-Control:no-cache, max-age=0', 'gs://finanzas-ui/index.html']

options:
  logging: CLOUD_LOGGING_ONLY
