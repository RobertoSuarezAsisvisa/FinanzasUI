steps:
  - name: 'node:22.22.0'
    entrypoint: bash
    args:
      - '-c'
      - |
        npm install --global bun@1.3.3
        bun install --frozen-lockfile
        bun run build -- --base-href /finanzas-ui/

  - name: 'gcr.io/cloud-builders/gsutil'
    args: ['-m', 'rsync', '-r', '-d', 'dist/finanzas-ui/browser', 'gs://finanzas-ui']

options:
  logging: CLOUD_LOGGING_ONLY
