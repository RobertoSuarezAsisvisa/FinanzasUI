steps:
  - name: 'node:20'
    entrypoint: npm
    args: ['ci']

  - name: 'node:20'
    entrypoint: npm
    args: ['run', 'build']

  - name: 'gcr.io/cloud-builders/gsutil'
    args: ['-m', 'rsync', '-r', '-d', 'dist/finanzas-ui/browser', 'gs://finanzas-ui']

options:
  logging: CLOUD_LOGGING_ONLY
